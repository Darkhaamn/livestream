# Nginx on EC2: app + API proxy + HLS origin for CloudFront.
# TLS: mount Let's Encrypt certs to deploy/certs/fullchain.pem and privkey.pem
# or terminate TLS at CloudFront only and listen on :80 here.

map $uri $cache_control {
    default                    "public, max-age=60";
    ~*\.m3u8$                  "public, max-age=1, s-maxage=1";
    ~*\.(ts|mp4|m4s)$          "public, max-age=31536000, immutable";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 20m;

    # --- HLS origin (CloudFront pulls this path) ---
    location /hls/ {
        # For production: uncomment and set ORIGIN_VERIFY_SECRET via envsubst template.
        # if ($http_x_origin_verify != "your-secret") { return 403; }

        rewrite ^/hls/(.*)$ /$1 break;
        proxy_pass http://mediamtx:8888;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Range, Accept" always;
        add_header Cache-Control $cache_control always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # --- WebRTC/WHEP (optional; low-latency preview only) ---
    location /webrtc/ {
        rewrite ^/webrtc/(.*)$ /$1 break;
        proxy_pass http://mediamtx:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # --- Main API (auth, users, streams) ---
    location /api/v1/ {
        proxy_pass http://api:8081/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- mtx-manager API (dashboard, vods, thumbnails, viewers) ---
    location /api/ {
        proxy_pass http://mtx-manager:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /internal/ {
        deny all;
    }

    # --- Chat WebSocket ---
    location /ws/ {
        proxy_pass http://chat:8082/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # --- Next.js frontend ---
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
